<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circuit Info</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    .circuit-hero { background:var(--bg2); border-bottom:1px solid var(--border); padding:0; position:relative; overflow:hidden; }
    .circuit-hero-img { width:100%; height:320px; object-fit:cover; display:block; filter:brightness(0.45); }
    .circuit-hero-overlay { position:absolute; bottom:0; left:0; right:0; padding:2rem; background:linear-gradient(transparent, rgba(0,0,0,0.85)); }
    .circuit-stats { display:flex; gap:1.5rem; flex-wrap:wrap; margin-top:1rem; }
    .cstat-val { font-size:1.3rem; font-weight:700; }
    .cstat-lbl { font-size:0.63rem; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-muted); margin-top:2px; }
    .info-row { display:flex; justify-content:space-between; align-items:center; padding:0.55rem 0.75rem; background:var(--bg3); border-radius:5px; }
    .info-row + .info-row { margin-top:0.4rem; }
    .info-lbl { font-size:0.72rem; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--text-dim); }
    .info-val { font-weight:700; font-size:0.9rem; }
  </style>
</head>
<body>
<nav>
  <a class="nav-logo" href="/"><span class="f1-badge">F1</span> Dashboard</a>
  <ul class="nav-links">
    <li><a href="/">Home</a></li><li><a href="/calendar">Kalender</a></li>
    <li><a href="/drivers">Coureurs</a></li><li><a href="/live">Live</a></li>
    <li><a href="/about">Over F1</a></li>
  </ul>
  <div class="nav-right"><div class="live-indicator"><div class="live-dot"></div><span>Live Data</span></div></div>
</nav>
<main>

<div class="circuit-hero">
  <img id="hero-img" class="circuit-hero-img" src="" alt="Circuit foto" onerror="this.style.display='none'">
  <div class="circuit-hero-overlay" style="max-width:1280px; margin:0 auto; position:relative;">
    <div style="font-size:0.72rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--red);margin-bottom:0.5rem;"><a href="javascript:history.back()" style="color:inherit;text-decoration:none">← Terug</a></div>
    <div id="c-name" style="font-size:2.2rem;font-weight:900;">Laden...</div>
    <div id="c-location" style="font-size:0.9rem;color:var(--text-muted);margin-top:0.3rem;"></div>
    <div class="circuit-stats" id="c-stats"></div>
  </div>
</div>

<div class="container">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-bottom:1.5rem;">

    <!-- Photo + description -->
    <div>
      <div class="section-title">Foto</div>
      <div style="border-radius:8px;overflow:hidden;background:var(--bg3);margin-bottom:1rem;">
        <img id="main-photo" src="" alt="Circuit" style="width:100%;height:240px;object-fit:cover;display:block;" onerror="this.parentElement.innerHTML='<div class=\'empty-state\'><div class=\'empty-icon\'>📷</div><div class=\'empty-text\'>Geen foto beschikbaar</div></div>'">
      </div>
      <div class="card">
        <div class="card-body" style="font-size:0.9rem;line-height:1.7;color:var(--text-muted);" id="c-desc">Laden...</div>
      </div>
    </div>

    <!-- Stats -->
    <div>
      <div class="section-title">Circuit details</div>
      <div class="card">
        <div class="card-body" id="c-info"><div class="loading"><div class="spinner"></div> Laden...</div></div>
      </div>
    </div>
  </div>
</div>

</main>
<script src="/static/helpers.js"></script>
<script src="/static/nav.js"></script>
<script>
initNav(2026, 2000, 2026);

const circuitId = "{{ circuit_id }}";

const CIRCUIT_PHOTOS = {
  'albert_park':  'https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Albert_Park_Circuit_Melbourne.jpg/800px-Albert_Park_Circuit_Melbourne.jpg',
  'bahrain':      'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e9/Bahrain_International_Circuit_from_the_air.jpg/800px-Bahrain_International_Circuit_from_the_air.jpg',
  'jeddah':       'https://upload.wikimedia.org/wikipedia/commons/thumb/f/fb/Jeddah_Corniche_Circuit_2021.jpg/800px-Jeddah_Corniche_Circuit_2021.jpg',
  'shanghai':     'https://upload.wikimedia.org/wikipedia/commons/thumb/7/72/Shanghai_Circuit.jpg/800px-Shanghai_Circuit.jpg',
  'miami':        'https://upload.wikimedia.org/wikipedia/commons/thumb/6/62/Hard_Rock_Stadium_2016.jpg/800px-Hard_Rock_Stadium_2016.jpg',
  'imola':        'https://upload.wikimedia.org/wikipedia/commons/thumb/b/b2/Autodromo_Enzo_e_Dino_Ferrari_2014.jpg/800px-Autodromo_Enzo_e_Dino_Ferrari_2014.jpg',
  'monaco':       'https://upload.wikimedia.org/wikipedia/commons/thumb/b/b1/Monte_Carlo_Formula_1_track_photo.jpg/800px-Monte_Carlo_Formula_1_track_photo.jpg',
  'villeneuve':   'https://upload.wikimedia.org/wikipedia/commons/thumb/0/05/Circuit_Gilles_Villeneuve.jpg/800px-Circuit_Gilles_Villeneuve.jpg',
  'catalunya':    'https://upload.wikimedia.org/wikipedia/commons/thumb/a/a8/Aereal_view_from_Circuit_de_Catalunya.jpg/800px-Aereal_view_from_Circuit_de_Catalunya.jpg',
  'red_bull_ring':'https://upload.wikimedia.org/wikipedia/commons/thumb/8/8e/RedBullRing.jpg/800px-RedBullRing.jpg',
  'silverstone':  'https://upload.wikimedia.org/wikipedia/commons/thumb/e/ef/Silverstone_Circuit_2020.jpg/800px-Silverstone_Circuit_2020.jpg',
  'hungaroring':  'https://upload.wikimedia.org/wikipedia/commons/thumb/a/a6/Hungaroring.jpg/800px-Hungaroring.jpg',
  'spa':          'https://upload.wikimedia.org/wikipedia/commons/thumb/7/7b/Spa-Francorchamps_Circuit.jpg/800px-Spa-Francorchamps_Circuit.jpg',
  'zandvoort':    'https://upload.wikimedia.org/wikipedia/commons/thumb/2/25/Zandvoort_circuit.jpg/800px-Zandvoort_circuit.jpg',
  'monza':        'https://upload.wikimedia.org/wikipedia/commons/thumb/8/82/Monza_track.jpg/800px-Monza_track.jpg',
  'baku':         'https://upload.wikimedia.org/wikipedia/commons/thumb/4/4c/Baku_City_Circuit.jpg/800px-Baku_City_Circuit.jpg',
  'marina_bay':   'https://upload.wikimedia.org/wikipedia/commons/thumb/5/5b/Marina_Bay_Street_Circuit_2012.jpg/800px-Marina_Bay_Street_Circuit_2012.jpg',
  'suzuka':       'https://upload.wikimedia.org/wikipedia/commons/thumb/a/a4/Suzuka_Circuit_2005.jpg/800px-Suzuka_Circuit_2005.jpg',
  'losail':       'https://upload.wikimedia.org/wikipedia/commons/thumb/5/57/Losail_International_Circuit.jpg/800px-Losail_International_Circuit.jpg',
  'americas':     'https://upload.wikimedia.org/wikipedia/commons/thumb/7/7d/Circuit_of_the_Americas_2014.jpg/800px-Circuit_of_the_Americas_2014.jpg',
  'rodriguez':    'https://upload.wikimedia.org/wikipedia/commons/thumb/5/50/Autodromo_Hermanos_Rodriguez.jpg/800px-Autodromo_Hermanos_Rodriguez.jpg',
  'interlagos':   'https://upload.wikimedia.org/wikipedia/commons/thumb/7/72/Autodromo_Jose_Carlos_Pace_Brazil.jpg/800px-Autodromo_Jose_Carlos_Pace_Brazil.jpg',
  'vegas':        'https://upload.wikimedia.org/wikipedia/commons/thumb/2/25/Las_Vegas_Strip_at_night.jpg/800px-Las_Vegas_Strip_at_night.jpg',
  'yas_marina':   'https://upload.wikimedia.org/wikipedia/commons/thumb/8/8f/Yas_Marina_Circuit.jpg/800px-Yas_Marina_Circuit.jpg',
};

async function loadCircuit() {
  // Fetch photo from Wikipedia via backend proxy
  const photoData = await apiFetch(`/api/circuit-photo/${circuitId}`);
  const photoUrl = photoData ? photoData.url : '';
  if (photoUrl) {
    document.getElementById('hero-img').src = photoUrl;
    document.getElementById('main-photo').src = photoUrl;
  } else {
    document.getElementById('hero-img').style.display = 'none';
    document.getElementById('main-photo').parentElement.innerHTML = '<div class="empty-state"><div class="empty-icon">📷</div><div class="empty-text">Geen foto beschikbaar</div></div>';
  }

  const data = await apiFetch(`/api/circuit/${circuitId}`);
  if (!data || !data.name) {
    document.getElementById('c-name').textContent = circuitId.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
    document.getElementById('c-desc').textContent = 'Geen informatie beschikbaar voor dit circuit.';
    document.getElementById('c-info').innerHTML = '<div class="empty-state"><div class="empty-icon">🏁</div><div class="empty-text">Geen details beschikbaar</div></div>';
    return;
  }

  document.getElementById('c-name').textContent = data.name;
  document.getElementById('c-location').textContent = `📍 ${data.city}, ${data.country}`;
  document.getElementById('c-desc').textContent = data.description;
  document.getElementById('c-stats').innerHTML = `
    <div class="cstat"><div class="cstat-val">${data.length} km</div><div class="cstat-lbl">Lengte</div></div>
    <div class="cstat"><div class="cstat-val">${data.laps}</div><div class="cstat-lbl">Ronden</div></div>
    <div class="cstat"><div class="cstat-val">${(data.length * data.laps).toFixed(1)} km</div><div class="cstat-lbl">Race afstand</div></div>
    <div class="cstat"><div class="cstat-val">${data.first_gp}</div><div class="cstat-lbl">Eerste GP</div></div>`;

  document.getElementById('c-info').innerHTML = `
    <div class="info-row"><span class="info-lbl">Rondelengte</span><span class="info-val">${data.length} km</span></div>
    <div class="info-row"><span class="info-lbl">Rondes</span><span class="info-val">${data.laps}</span></div>
    <div class="info-row"><span class="info-lbl">Race afstand</span><span class="info-val">${(data.length * data.laps).toFixed(1)} km</span></div>
    <div class="info-row"><span class="info-lbl">Ronderecord</span><span class="info-val" style="color:var(--green)">${data.lap_record}</span></div>
    <div class="info-row"><span class="info-lbl">Snelste coureur</span><span class="info-val" style="font-size:0.82rem">${data.lap_record_driver}</span></div>
    <div class="info-row"><span class="info-lbl">Eerste GP</span><span class="info-val">${data.first_gp}</span></div>
    <div class="info-row"><span class="info-lbl">Land</span><span class="info-val">${data.country}</span></div>
    <div class="info-row"><span class="info-lbl">Stad</span><span class="info-val">${data.city}</span></div>`;
}

loadCircuit();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:transparent; font-family:'Barlow Condensed',sans-serif; }
    @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&display=swap');
    .w {
      display:inline-flex; align-items:center; gap:12px;
      background:rgba(6,6,8,0.96); border:1px solid rgba(225,6,0,0.4);
      border-radius:10px; padding:10px 16px;
      box-shadow:0 4px 24px rgba(0,0,0,0.6);
    }
    .logo { font-size:1rem; font-weight:900; letter-spacing:-0.5px; color:#f0f0f5; }
    .logo span { color:#e10600; }
    .divider { width:1px; height:32px; background:rgba(255,255,255,0.1); }
    .race { display:flex; flex-direction:column; }
    .race-name { font-size:0.72rem; font-weight:900; letter-spacing:1px; text-transform:uppercase; color:rgba(255,255,255,0.5); }
    .cd { display:flex; gap:6px; align-items:baseline; margin-top:2px; }
    .cd-num { font-size:1.5rem; font-weight:900; color:#e10600; line-height:1; font-variant-numeric:tabular-nums; }
    .cd-sep { font-size:1.1rem; font-weight:900; color:rgba(225,6,0,0.3); }
    .cd-label { font-size:0.5rem; font-weight:900; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,0.3); text-align:center; }
    .cd-unit { display:flex; flex-direction:column; align-items:center; }
    a { text-decoration:none; color:inherit; }
    a:hover .w { border-color:rgba(225,6,0,0.7); }
  </style>
</head>
<body>
<a href="https://f1forlive.onrender.com" target="_blank">
  <div class="w">
    <div class="logo">F1<span>FOR</span>LIVE</div>
    <div class="divider"></div>
    <div class="race">
      <div class="race-name" id="rname">Laden…</div>
      <div class="cd">
        <div class="cd-unit"><div class="cd-num" id="d">--</div><div class="cd-label">d</div></div>
        <div class="cd-sep">:</div>
        <div class="cd-unit"><div class="cd-num" id="h">--</div><div class="cd-label">h</div></div>
        <div class="cd-sep">:</div>
        <div class="cd-unit"><div class="cd-num" id="m">--</div><div class="cd-label">m</div></div>
        <div class="cd-sep">:</div>
        <div class="cd-unit"><div class="cd-num" id="s">--</div><div class="cd-label">s</div></div>
      </div>
    </div>
  </div>
</a>
<script>
fetch('/api/next-race').then(r=>r.json()).then(d=>{
  if(!d?.name) return;
  document.getElementById('rname').textContent = d.name.replace(' Grand Prix',' GP');
  const t = new Date(d.iso||(d.date+'T'+(d.time||'14:00:00')+'Z'));
  function tick(){
    const diff=t-Date.now();
    if(diff<=0){['d','h','m','s'].forEach(id=>document.getElementById(id).textContent='00');return;}
    const f=n=>String(n).padStart(2,'0');
    document.getElementById('d').textContent=Math.floor(diff/86400000);
    document.getElementById('h').textContent=f(Math.floor(diff%86400000/3600000));
    document.getElementById('m').textContent=f(Math.floor(diff%3600000/60000));
    document.getElementById('s').textContent=f(Math.floor(diff%60000/1000));
  }
  tick(); setInterval(tick,1000);
});
</script>
</body>
</html>

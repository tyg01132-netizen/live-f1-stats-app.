<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>F1 Coureurs</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<nav>
  <a class="nav-logo" href="/"><span class="f1-badge">F1</span> Dashboard</a>
  <ul class="nav-links">
    <li><a href="/">Home</a></li>
    <li><a href="/calendar">Kalender</a></li>
    <li><a href="/drivers" class="active">Coureurs</a></li>
    <li><a href="/live">Live</a></li>
    <li><a href="/about">Over F1</a></li>
  </ul>
  <div class="nav-right">
    <select id="year-dropdown" class="year-select"></select>
    <div class="live-indicator"><div class="live-dot"></div><span>Live</span></div>
  </div>
</nav>
<main>
<div class="container">
  <div class="section-title" style="margin-top:1rem" id="drv-title">Coureurs Kampioenschap</div>

  <div class="card" style="margin-bottom:2rem;">
    <div class="card-header"><span class="card-title">Punten overzicht (top 10)</span></div>
    <div class="card-body">
      <div style="height:260px;position:relative">
        <canvas id="points-chart"></canvas>
      </div>
    </div>
  </div>

  <div id="drivers-grid" class="drivers-grid">
    <div class="loading" style="grid-column:1/-1"><div class="spinner"></div> Laden...</div>
  </div>
</div>
</main>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="/static/helpers.js"></script>
<script src="/static/nav.js"></script>
<script>
const CURRENT_YEAR = {{ current_year }}, MIN_YEAR = {{ min_year }}, MAX_YEAR = {{ max_year }};
const activeYear = initNav(CURRENT_YEAR, MIN_YEAR, MAX_YEAR);
document.getElementById('drv-title').textContent = `Coureurs Kampioenschap ${activeYear}`;

async function loadDrivers() {
  const el = document.getElementById('drivers-grid');
  const data = await apiFetch(`/api/standings/drivers?year=${activeYear}`);

  if (!data || !data.length) {
    el.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🏎️</div><div class="empty-text">Geen data beschikbaar</div></div>';
    return;
  }

  el.innerHTML = data.map(d => {
    const color = teamColor(d.team_id);
    return `<a class="driver-card" href="/driver/${d.driver_id}?year=${activeYear}" style="--team-color:${color}">
      <div class="driver-number-big" style="color:${color};opacity:0.12;font-size:4rem;font-weight:900;position:absolute;right:0.5rem;top:0.5rem;line-height:1">${d.number}</div>
      <div class="driver-pos-badge" style="position:relative">P${d.position}</div>
      <div class="driver-card-name" style="position:relative">${d.name}</div>
      <div class="driver-card-team" style="color:${color};position:relative">${d.team}</div>
      <div class="driver-card-pts" style="position:relative">${d.points}</div>
      <div class="driver-card-pts-label">punten</div>
      <div style="font-size:0.8rem;color:var(--text-muted);margin-top:0.3rem">${d.wins} win${d.wins!==1?'s':''}</div>
      <div style="position:absolute;top:0;left:0;right:0;height:3px;background:${color};border-radius:8px 8px 0 0"></div>
    </a>`;
  }).join('');

  // Chart
  const top10 = data.slice(0, 10);
  const ctx = document.getElementById('points-chart').getContext('2d');
  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: top10.map(d => d.name.split(' ').pop()),
      datasets: [{
        data: top10.map(d => d.points),
        backgroundColor: top10.map(d => teamColor(d.team_id) + 'cc'),
        borderColor: top10.map(d => teamColor(d.team_id)),
        borderWidth: 2,
        borderRadius: 5,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: {
        callbacks: { label: ctx => ` ${ctx.raw} punten` }
      }},
      scales: {
        x: { ticks: { color: '#777', font: { size: 11, weight: '700' } }, grid: { color: 'rgba(255,255,255,0.04)' } },
        y: { ticks: { color: '#777' }, grid: { color: 'rgba(255,255,255,0.04)' } }
      }
    }
  });
}

loadDrivers();
</script>
</body>
</html>
